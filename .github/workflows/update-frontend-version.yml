name: Update Frontend Version

on:
  push:
    branches:
      - dev
      - main
    paths:
      - 'frontend/**'
      - '!frontend/src/config/version.toml'

jobs:
  update-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Update Frontend Version
        run: node .github/scripts/update-frontend-version.js
        env:
          GITHUB_REF: ${{ github.ref }}

      - name: Commit and push if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          if git diff --quiet frontend/src/config/version.toml; then
            echo "No changes to version file"
          else
            git add frontend/src/config/version.toml
            git commit -m "chore: update frontend version"
            git push
          fi